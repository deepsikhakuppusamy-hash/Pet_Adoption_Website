<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pawfect Adoption Form</title>

  <!-- Font Awesome (IMPORTANT) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to top, #fdf6e3 0%, #e8f1f8 50%, #d0e6f2 80%, #b3d9e6 100%);
      background-attachment: fixed;
      color: #333;
      padding-top: 70px;
      /* clears fixed navbar */
    }

    /* NAVBAR */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      height: 70px;
      padding: 0 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      z-index: 100;
    }

    /* LOGO */
    .logo {
      color: white;
      font-size: 1.6rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .logo i {
      color:#ff914d;
      font-size: 1.3rem;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 30px;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: #ff914d;
    }

    /* Hamburger */
    .hamburger {
      display: none;
      flex-direction: column;
      cursor: pointer;
      gap: 5px;
    }

    .hamburger span {
      width: 25px;
      height: 3px;
      background: white;
      transition: 0.3s;
    }

    /* FORM SECTION */
    .form-section {
      min-height: calc(100vh - 70px);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 70px 20px 40px;
    }

    .form-card {
      background: #fff;
      padding: 50px;
      border-radius: 20px;
      max-width: 700px;
      width: 100%;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
    }

    .form-card h1 {
      font-size: 2.2rem;
      color: #ff914d;
      margin-bottom: 10px;
      text-align: center;
    }

    .form-card p {
      margin-bottom: 30px;
      color: #555;
      text-align: center;
    }

    .adoption-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .adoption-form label {
      font-weight: 600;
      margin-bottom: 5px;
      display: block;
    }

    .adoption-form input,
    .adoption-form select,
    .adoption-form textarea {
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      width: 100%;
      font-size: 1rem;
    }

    .adoption-form textarea {
      resize: vertical;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
      margin-top: 10px;
      text-align: left;
      justify-content: flex-start;
      width: 100%;
    }

    .checkbox-label input[type="checkbox"] {
      margin: 0;
      width: 16px;
      height: 16px;
    }

    .btn {
      display: inline-block;
      padding: 14px 36px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      text-align: center;
    }

    .btn.primary {
      background-color: #ff914d;
      color: #fff;
      border: none;
    }

    .btn.primary:hover {
      background-color: #ff6b1a;
    }

    .btn.secondary {
      background-color: #5a3e2b;
      color: #fff;
      margin-top: 20px;
    }

    .btn.secondary:hover {
      background-color: #3e2a1d;
    }

    .buttons {
      text-align: center;
      margin-top: 20px;
    }

    /* RESPONSIVE */
    @media (max-width: 480px) {
      .form-card {
        padding: 20px;
      }

      .form-card h1 {
        font-size: 1.5rem;
      }

      .form-card p {
        font-size: 0.85rem;
      }

      .adoption-form input,
      .adoption-form select,
      .adoption-form textarea {
        font-size: 0.9rem;
        padding: 10px;
      }

      .btn {
        padding: 10px 20px;
        font-size: 0.9rem;
      }

       .nav-links {
        position: absolute;
        top: 70px;
        right: 0;
        background: rgba(0,0,0,0.9);
        flex-direction: column;
        gap: 15px;
        width: 200px;
        padding: 20px;
        display: none;
      }

      .nav-links.active { display: flex; }

      .navbar { padding: 0 20px; }

      .hamburger {
        display: flex;
      }
    }
  </style>
</head>

<body class="adoption-page">

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">
    <i class="fas fa-paw"> </i> 
    Pawfect
  </div>

    <div class="hamburger" onclick="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="instruction.html">How It Works</a></li>
    <li><a href="browse.html">Browse</a></li>
    <li><a href="review.html">Reviews</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="about.html">About</a></li>
    
  </ul>
  </nav>

  <!-- FORM -->
  <section class="form-section">
    <div class="form-card">

      <h1>Adoption Form</h1>
      <p>Fill in your details and we’ll get back to you within 24 hours.</p>

      <form class="adoption-form" id="adoptionForm" onsubmit="return validateForm()">

        <div>
          <label for="name">Full Name*</label>
          <input type="text" id="name" name="name" required>
        </div>

        <div>
          <label for="phone">Phone Number*</label>
          <input type="tel" id="phone" name="phone" placeholder="10-digit number" required>
        </div>

        <div>
          <label for="email">Email Address*</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div>
          <label for="city">City / Town*</label>
          <input type="text" id="city" name="city" required>
        </div>

        <div>
          <label for="home">Home Type*</label>
          <select id="home" name="home" required>
            <option value="">Select...</option>
            <option value="apartment">Apartment</option>
            <option value="house">House</option>
            <option value="farm">Farm</option>
          </select>
        </div>

        <div>
          <label for="pets">Do you have other pets at home?*</label>
          <select id="pets" name="pets" required>
            <option value="">Select...</option>
            <option value="yes">Yes</option>
            <option value="no">No</option>
          </select>
        </div>

        <div>
          <label for="pet">Pet Name*</label>
          <input type="text" id="pet" name="pet" placeholder="e.g., Bruno, Luna" required>
        </div>

        <div>
          <label for="reason">Why do you want this pet?*</label>
          <textarea id="reason" name="reason" rows="4" required></textarea>
        </div>

        <div>
          <label for="time">How many hours per day can you spend with the pet?*</label>
          <input type="number" id="time" name="time" min="1" max="24" required>
        </div>

        <div class="checkbox-label">
          <input type="checkbox" id="consent" name="consent" required>
          <label for="consent">
            I agree to be contacted by Pawfect Companions regarding my application.
          </label>
        </div>

        <button type="submit" class="btn primary">
          Submit Application 🐾
        </button>

      </form>

      <div class="buttons">
        <button class="btn secondary" onclick="goBack()">← Back to Listings</button>
      </div>

    </div>
  </section>

  <script>
  /* GET PET TYPE FROM URL */
  const urlParams = new URLSearchParams(window.location.search);
  const petType = urlParams.get("type");

  /* FORM VALIDATION */
  function validateForm() {
    const phone = document.getElementById("phone").value.trim();
    const email = document.getElementById("email").value.trim();

    // EMAIL VALIDATION
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if (!emailPattern.test(email)) {
      alert("Please enter a valid email address.");
      return false;
    }

    // PHONE VALIDATION
    if (!/^[0-9]{10}$/.test(phone)) {
      alert("Please enter a valid 10-digit phone number.");
      return false;
    }

    // CONSENT CHECK
    const consent = document.getElementById("consent").checked;

    if (!consent) {
      alert("You must agree to be contacted.");
      return false;
    }

    // SUCCESS
    window.location.href = "confirmation.html";
    return false;
  }

  /* BACK BUTTON */
  function goBack() {
    if (petType === "dog") window.location.href = "dog.html";
    else if (petType === "cat") window.location.href = "cat.html";
    else if (petType === "rabbit") window.location.href = "rabbit.html";
    else if (petType === "bird") window.location.href = "bird.html";
    else if (petType === "fish") window.location.href = "fish.html";
    else if (petType === "hamster") window.location.href = "hamster.html";
    else if (petType === "turtle") window.location.href = "turtle.html";
    else if (petType === "sugarglider") window.location.href = "sugarglider.html";
    else window.location.href = "browse.html";
  }

  /* MENU TOGGLE */
  function toggleMenu() {
    document.getElementById('navLinks').classList.toggle('active');
  }
</script>
</body>
</html>
